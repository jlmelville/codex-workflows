name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  skills:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # Pinned to actions/checkout v4.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate skills
        run: ./scripts/validate-skills.sh

      - name: Audit workflows
        run: ./skills/r-ci-hardening/scripts/audit-actions.sh .github/workflows

      - name: ShellCheck shell scripts
        shell: bash
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck not found; skipping"
            exit 0
          fi

          mapfile -t shell_files < <(find . -path ./.git -prune -o -type f -name '*.sh' -print)
          if ((${#shell_files[@]} == 0)); then
            echo "No shell scripts found"
            exit 0
          fi

          shellcheck "${shell_files[@]}"
