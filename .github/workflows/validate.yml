name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  skills:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # Pinned to actions/checkout v7.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install validation dependencies
        run: |
          missing_packages=()
          if ! command -v shellcheck >/dev/null 2>&1; then
            missing_packages+=(shellcheck)
          fi
          if ! command -v Rscript >/dev/null 2>&1; then
            missing_packages+=(r-base-core)
          fi
          if ((${#missing_packages[@]} > 0)); then
            sudo apt-get update
            sudo apt-get install -y "${missing_packages[@]}"
          fi
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
          python3 -m pip install --user uv
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Validate skills
        run: ./scripts/validate-skills.sh

      - name: Audit workflows
        run: ./skills/github-actions-hardening/scripts/audit-actions.sh .github/workflows
