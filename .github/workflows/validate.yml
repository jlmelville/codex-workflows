name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Manual update owner: prompts/skill-repository-retrospective.md.
  # Keep this compatible with the Go version printed by the workflow.
  ACTIONLINT_VERSION: v1.7.12

jobs:
  skills:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # Pinned to actions/checkout v7.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install validation dependencies
        run: |
          missing_packages=()
          if ! command -v shellcheck >/dev/null 2>&1; then
            missing_packages+=(shellcheck)
          fi
          if ! command -v Rscript >/dev/null 2>&1; then
            missing_packages+=(r-base-core)
          fi
          if ! command -v rg >/dev/null 2>&1; then
            missing_packages+=(ripgrep)
          fi
          if ! command -v go >/dev/null 2>&1; then
            missing_packages+=(golang-go)
          fi
          if ((${#missing_packages[@]} > 0)); then
            sudo apt-get update
            sudo apt-get install -y "${missing_packages[@]}"
          fi
          go install github.com/rhysd/actionlint/cmd/actionlint@"${ACTIONLINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
          python_user_base="$(python3 -m site --user-base)"
          python3 -m pip install --user -r .github/requirements.txt
          echo "${python_user_base}/bin" >> "${GITHUB_PATH}"

      - name: Print validation tool versions
        run: |
          shellcheck --version
          Rscript --version
          rg --version
          go version
          actionlint -version
          uv --version
          zizmor --version

      - name: Validate skills
        run: ./scripts/validate-skills.sh

      - name: Audit workflows
        run: ./skills/github-actions-hardening/scripts/audit-actions.sh .github/workflows

  skills-macos:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # Pinned to actions/checkout v7.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install validation dependencies
        run: |
          missing_packages=()
          if ! command -v shellcheck >/dev/null 2>&1; then
            missing_packages+=(shellcheck)
          fi
          if ! command -v Rscript >/dev/null 2>&1; then
            missing_packages+=(r)
          fi
          if ! command -v rg >/dev/null 2>&1; then
            missing_packages+=(ripgrep)
          fi
          if ! command -v go >/dev/null 2>&1; then
            missing_packages+=(go)
          fi
          if ((${#missing_packages[@]} > 0)); then
            brew update
            brew install "${missing_packages[@]}"
          fi
          go install github.com/rhysd/actionlint/cmd/actionlint@"${ACTIONLINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
          validation_venv="${RUNNER_TEMP}/validation-venv"
          python3 -m venv "${validation_venv}"
          "${validation_venv}/bin/python" -m pip install -r .github/requirements.txt
          echo "${validation_venv}/bin" >> "${GITHUB_PATH}"

      - name: Print validation tool versions
        run: |
          shellcheck --version
          Rscript --version
          rg --version
          go version
          actionlint -version
          uv --version
          zizmor --version

      - name: Validate skills
        run: ./scripts/validate-skills.sh

      - name: Audit workflows
        run: ./skills/github-actions-hardening/scripts/audit-actions.sh .github/workflows
